name: coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
            submodules: 'recursive'
    
      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y lcov cmake

      - name: Configure CMake
        run: cmake -S . -B build --preset coverage 

      - name: Build Cmake
        run: cmake --build build

      - name: Run coverage
        run: cmake --build build --target ccov-all


      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/ccov/ccov-all.info
          disable_search: true
          fail_ci_if_error: true
          gcov_ignore: "*/tests/*,*/external/*"
          verbose: true